<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop — Mattea Estudio</title>
  <meta name="description" content="Limited edition prints from Matt &amp; Tea — bring a piece of the studio's murals home." />
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700&display=swap" rel="stylesheet" />
  <script>document.documentElement.classList.add("js")</script>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
<div id="smooth-wrapper">
<div id="smooth-content">

  <!-- ============ HEADER ============ -->
  <!--#include partials/header.html-->

  <main id="top">

    <!-- ============ SHOP ============ -->
    <section class="shop-page">
      <h1 class="h-script" data-anim="words">Shop</h1>
      <p class="shop-lead" data-anim="reveal">Limited edition prints, taken from the studio&rsquo;s own murals. Get in touch to order.</p>

      <hr class="rule" data-anim="line" />

      <div class="shop-grid">
        <article class="shop-item" data-anim="reveal">
          <figure class="shop-item-photo img-reveal" data-anim="img">
            <img src="/assets/bhs-strip-1.jpg" alt="Print placeholder" />
          </figure>
          <h3 class="shop-item-title">Dionysus Print</h3>
          <p class="shop-item-price">&euro;45</p>
        </article>

        <article class="shop-item" data-anim="reveal">
          <figure class="shop-item-photo img-reveal" data-anim="img">
            <img src="/assets/bhs-strip-2.jpg" alt="Print placeholder" />
          </figure>
          <h3 class="shop-item-title">Barcelona Skyline Print</h3>
          <p class="shop-item-price">&euro;45</p>
        </article>

        <article class="shop-item" data-anim="reveal">
          <figure class="shop-item-photo img-reveal" data-anim="img">
            <img src="/assets/bhs-strip-3.jpg" alt="Print placeholder" />
          </figure>
          <h3 class="shop-item-title">Wildflower Print</h3>
          <p class="shop-item-price">&euro;45</p>
        </article>

        <article class="shop-item" data-anim="reveal">
          <figure class="shop-item-photo img-reveal" data-anim="img">
            <img src="/assets/bhs-strip-4.jpg" alt="Print placeholder" />
          </figure>
          <h3 class="shop-item-title">Harvest Print</h3>
          <p class="shop-item-price">&euro;45</p>
        </article>

        <article class="shop-item" data-anim="reveal">
          <figure class="shop-item-photo img-reveal" data-anim="img">
            <img src="/assets/bhs-strip-5.jpg" alt="Print placeholder" loading="lazy" decoding="async" />
          </figure>
          <h3 class="shop-item-title">Community Print</h3>
          <p class="shop-item-price">&euro;45</p>
        </article>

        <article class="shop-item" data-anim="reveal">
          <figure class="shop-item-photo img-reveal" data-anim="img">
            <img src="/assets/bhs-duo-narrow.jpg" alt="Print placeholder" loading="lazy" decoding="async" />
          </figure>
          <h3 class="shop-item-title">Folklore Print</h3>
          <p class="shop-item-price">&euro;55</p>
        </article>

        <article class="shop-item" data-anim="reveal">
          <figure class="shop-item-photo img-reveal" data-anim="img">
            <img src="/assets/bhs-duo-wide.jpg" alt="Print placeholder" loading="lazy" decoding="async" />
          </figure>
          <h3 class="shop-item-title">Studio Edition Print</h3>
          <p class="shop-item-price">&euro;55</p>
        </article>

        <article class="shop-item" data-anim="reveal">
          <figure class="shop-item-photo img-reveal" data-anim="img">
            <img src="/assets/stories-tall-3.jpg" alt="Print placeholder" loading="lazy" decoding="async" />
          </figure>
          <h3 class="shop-item-title">Limited Edition Print</h3>
          <p class="shop-item-price">&euro;65</p>
        </article>
      </div>
    </section>

  </main>

  <!-- ============ FOOTER ============ -->
  <!--#include partials/footer.html-->

</div><!-- /smooth-content -->
</div><!-- /smooth-wrapper -->

<script type="module" src="/src/project.js"></script>
</body>
</html>
