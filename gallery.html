<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — Mattea Estudio</title>
  <meta name="description" content="A collection of murals by Matt &amp; Tea — schools, businesses and private commissions across Barcelona and beyond." />
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700&display=swap" rel="stylesheet" />
  <script>document.documentElement.classList.add("js")</script>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
<div id="smooth-wrapper">
<div id="smooth-content">

  <!-- ============ HEADER ============ -->
  <header class="site-header">
    <div class="shell header-grid">

      <nav class="site-nav" aria-label="Main navigation" data-anim="nav">
        <div class="nav-row nav-row-1">
          <a href="gallery.html">Gallery</a>
          <a href="about.html">Design</a>
          <a href="shop.html">Shop</a>
        </div>
        <div class="nav-row nav-row-2">
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        </div>
      </nav>

      <a class="logo logo-header" href="index.html" aria-label="Mattea Estudio — home" data-anim="logo">
        <span class="logo-mark">
          <span class="logo-tagline">Studio</span>
          <span class="logo-rule" aria-hidden="true"></span>
          <span class="logo-word"><strong>MAT</strong>TEA</span>
        </span>
      </a>

      <!-- Empty bordered box from the Figma header — no content defined in the file yet -->
      <div class="header-box" data-anim="nav" aria-hidden="true"></div>
    </div>
  </header>

  <main id="top">

    <!-- ============ GALLERY ============ -->
    <section class="gallery-page">
      <h1 class="h-script" data-anim="words">Gallery</h1>
      <p class="gallery-lead" data-anim="reveal">A collection of murals, each one grown from a conversation. Hover over a piece to see the idea behind it.</p>

      <hr class="rule" data-anim="line" />

      <div class="gallery-grid">
        <figure class="gallery-item img-reveal" data-anim="img" tabindex="0">
          <img src="/assets/hero.jpg" alt="Mural placeholder — Every Wall Has a Story" />
          <figcaption class="gallery-card">
            <span class="gallery-card-label">The Idea</span>
            <p>Every wall has a story&mdash;this one began with a conversation about home.</p>
          </figcaption>
        </figure>

        <figure class="gallery-item img-reveal" data-anim="img" tabindex="0">
          <img src="/assets/gallery-1.jpg" alt="Mural placeholder" />
          <figcaption class="gallery-card">
            <span class="gallery-card-label">The Idea</span>
            <p>A bold botanical scene bringing life to a quiet courtyard.</p>
          </figcaption>
        </figure>

        <figure class="gallery-item img-reveal" data-anim="img" tabindex="0">
          <img src="/assets/gallery-2.jpg" alt="Mural placeholder" />
          <figcaption class="gallery-card">
            <span class="gallery-card-label">The Idea</span>
            <p>Layered colour and motion, inspired by the rhythm of the city.</p>
          </figcaption>
        </figure>

        <figure class="gallery-item img-reveal" data-anim="img" tabindex="0">
          <img src="/assets/gallery-3.jpg" alt="Mural placeholder" />
          <figcaption class="gallery-card">
            <span class="gallery-card-label">The Idea</span>
            <p>A quiet portrait of connection, painted for a family home.</p>
          </figcaption>
        </figure>

        <figure class="gallery-item img-reveal" data-anim="img" tabindex="0">
          <img src="/assets/bhs-hero.jpg" alt="Mural placeholder — Barcelona High School" />
          <figcaption class="gallery-card">
            <span class="gallery-card-label">The Idea</span>
            <p>Ten values, one wall&mdash;built with the students who live it every day.</p>
          </figcaption>
        </figure>

        <figure class="gallery-item img-reveal" data-anim="img" tabindex="0">
          <img src="/assets/bhs-full.jpg" alt="Mural placeholder" />
          <figcaption class="gallery-card">
            <span class="gallery-card-label">The Idea</span>
            <p>A playground transformed into a canvas of shared imagination.</p>
          </figcaption>
        </figure>

        <figure class="gallery-item img-reveal" data-anim="img" tabindex="0">
          <img src="/assets/stories-tall-1.jpg" alt="Mural placeholder" />
          <figcaption class="gallery-card">
            <span class="gallery-card-label">The Idea</span>
            <p>Faces and forms drawn from local folklore and memory.</p>
          </figcaption>
        </figure>

        <figure class="gallery-item img-reveal" data-anim="img" tabindex="0">
          <img src="/assets/stories-tall-2.jpg" alt="Mural placeholder" />
          <figcaption class="gallery-card">
            <span class="gallery-card-label">The Idea</span>
            <p>An abstract meditation on growth, painted floor to ceiling.</p>
          </figcaption>
        </figure>

        <figure class="gallery-item img-reveal" data-anim="img" tabindex="0">
          <img src="/assets/stories-wide.jpg" alt="Mural placeholder" />
          <figcaption class="gallery-card">
            <span class="gallery-card-label">The Idea</span>
            <p>Where community meets colour&mdash;a mural made for gathering.</p>
          </figcaption>
        </figure>
      </div>
    </section>

  </main>

  <!-- ============ FOOTER ============ -->
  <footer class="site-footer">
    <hr class="rule rule-footer" data-anim="line" />
    <div class="shell">
      <a class="logo logo-footer" href="index.html" aria-label="Mattea Estudio — home">
        <span class="logo-mark">
          <span class="logo-tagline">Studio</span>
          <span class="logo-rule" aria-hidden="true"></span>
          <span class="logo-word"><strong>MAT</strong>TEA</span>
        </span>
      </a>
    </div>
  </footer>

</div><!-- /smooth-content -->
</div><!-- /smooth-wrapper -->

<script type="module" src="/src/project.js"></script>
</body>
</html>
